name: Sync to Hugging Face Hub
on:
  push:
    branches: [master]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://sahilmohd-10:$HF_TOKEN@huggingface.co/spaces/sahilmohd-10/Prasant_Sahil master
